<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsere Reise zum Glück</title>
    <style>
        :root {
            --bg-white: #ffffff;
            --text-dark: #3e2723;
            --accent-coral: #ff7f50;
            --barolo-red: #722f37;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-white);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dark);
        }
        .header {
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--text-dark);
        }
        .map-container {
            width: 95%;
            max-width: 1100px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            transition: all 0.5s ease;
        }
        .map-container img {
            width: 100%;
            height: auto;
            display: block;
            transition: filter 1.5s ease;
        }
        .status-box {
            margin-top: 25px;
            padding: 20px;
            background: #fffaf0;
            border: 1px solid #eee;
            border-left: 6px solid var(--accent-coral);
            width: 85%;
            max-width: 600px;
            text-align: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .footer {
            margin: 40px 0;
            font-style: italic;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Alles Liebe zum Geburtstag!</h1>
        <p>Ein ganz besonderer Weg liegt vor uns...</p>
    </div>

    <div class="map-container">
        <img src="schatzkarte.jpg" id="mainMap" alt="Unsere Schatzkarte">
    </div>

    <div class="status-box" id="statusMessage">
        Lade Abenteuer-Daten...
    </div>

    <div class="footer">❤️ 16. Mai 2026</div>

    <script>
        // DAS DATUM: 16. Mai 2026
        const targetDate = new Date(2026, 4, 16); // Monat ist 0-basiert (4 = Mai)

        const schedule = [
            { time: "00:00", msg: "Heute ist dein Tag! Um 09:30 Uhr geht die Reise los." },
            { time: "09:30", msg: "Das Fundament legen - Die Reise beginnt!" },
            { time: "10:30", msg: "Zeit für uns - Wir lassen uns treiben..." },
            { time: "12:30", msg: "Atempause im Grünen - Zeit zum Durchatmen." },
            { time: "14:30", msg: "Neues Entdecken! (Schuhe gecheckt?)" },
            { time: "18:45", msg: "Gemeinsamer Genuss - Der Tempel der Geschmäcker wartet." },
            { time: "20:00", msg: "Tiefe Verbundenheit - Der Barolo wird entkorkt." }
        ];

        function checkStatus() {
            const now = new Date();
            const statusEl = document.getElementById('statusMessage');
            const imgEl = document.getElementById('mainMap');

            // 1. Datum prüfen (Jahr, Monat, Tag)
            const isToday = now.getFullYear() === targetDate.getFullYear() &&
                            now.getMonth() === targetDate.getMonth() &&
                            now.getDate() === targetDate.getDate();
            
            const isPast = now > targetDate && !isToday;
            const isFuture = now < targetDate;

            if (isFuture) {
                statusEl.innerText = "Die Reise beginnt am 16. Mai. Die Vorfreude steigt...";
                imgEl.style.filter = "grayscale(100%) blur(5px) opacity(0.7)"; 
                return;
            }

            if (isPast) {
                statusEl.innerText = "Ein unvergesslicher Tag. Schön, dass wir ihn geteilt haben! ❤️";
                imgEl.style.filter = "none";
                return;
            }

            // 2. Logik für den 16.05.2026
            imgEl.style.filter = "none";
            const currentTime = now.getHours().toString().padStart(2, '0') + ":" + 
                              now.getMinutes().toString().padStart(2, '0');
            
            let currentAction = "Bereit für unser Abenteuer?";
            
            for (let item of schedule) {
                if (currentTime >= item.time) {
                    currentAction = item.msg;
                }
            }
            
            statusEl.innerText = "Aktueller Meilenstein: " + currentAction;
        }

        // Alle 10 Sekunden prüfen
        setInterval(checkStatus, 10000);
        checkStatus();
    </script>
</body>
</html>
